            - text: N. Hari, is appointed as the Chairman of the Rubber Board. His appointment is for a period of three years. He was a member of the Rubber Board for a period of three years from 28 June 2022, representing small rubber growers from Kerala. Sri. N. Hari, a native of Pallikkathode in Kottayam, also served as Executive Committee Member of the Board from 07 October 2023 to 06 October 2024.
