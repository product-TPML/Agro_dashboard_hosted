<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Libre+Caslon+Text:wght@400;700&display=swap" rel="stylesheet">
    <style>
:root {
  --bg: #f6f4ff;
  --bg-strong: #e7e6f7;
  --panel: #fffdfb;
  --panel-alt: #f4f2ff;
  --panel-soft: #faf8ff;
  --ink: #161a32;
  --muted: #5b615d;
  --line: #d3d5de;
  --accent: #1b4332;
  --accent-strong: #012d1d;
  --accent-soft: #d9eee1;
  --warm: #cd9d6d;
  --shadow: 0 18px 44px rgba(22, 26, 50, 0.08);
  --gain: #14804a;
  --loss: #ba1a1a;
  --modal: #b7791f;
  --price-max: #1e3a8a;
  --price-min: #c2410c;
  --price-modal: #cc9900;
}
* { box-sizing: border-box; }
body {
  margin: 0; color: var(--ink);
  font-family: "Inter", system-ui, sans-serif;
  background: radial-gradient(circle at top left, rgba(63,102,83,0.08), transparent 26%), radial-gradient(circle at 82% 16%, rgba(205,157,109,0.14), transparent 20%), linear-gradient(180deg,#fcfbff 0%,var(--bg) 100%);
}
button,input,select { font: inherit; }
.shell { max-width: 1380px; margin: 0 auto; padding: 28px 20px 56px; }
.shell-top { margin-bottom: 16px; position: relative; z-index: 35; }
.shell-top-inner { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.shell-top-left { min-width: 96px; display: flex; align-items: center; position: relative; z-index: 36; }
.locale-toggle { display: inline-flex; gap: 6px; padding: 6px; border: 1px solid var(--line); border-radius: 999px; background: rgba(255,253,251,0.96); box-shadow: var(--shadow); position: relative; z-index: 36; }
.locale-toggle-button { border: 0; border-radius: 999px; background: transparent; color: var(--accent-strong); padding: 9px 14px; font-weight: 700; cursor: pointer; }
.locale-toggle-button.is-active { background: linear-gradient(135deg,var(--accent),var(--accent-strong)); color: #fff; }
.panel { background: rgba(255,253,251,0.97); border: 1px solid var(--line); border-radius: 28px; box-shadow: var(--shadow); }
.search-panel { position: relative; padding: 18px; width: 100%; min-width: 0; }
.search-label { display: block; margin-bottom: 10px; color: var(--muted); font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
.search-box { display: flex; align-items: center; gap: 12px; border: 1px solid var(--line); border-radius: 18px; background: var(--panel-soft); padding: 0 16px; }
.search-box input { width: 100%; border: 0; outline: none; background: transparent; padding: 16px 0; font-size: 18px; }
.search-box span { color: var(--accent); font-size: 20px; }
.search-hint { margin: 10px 2px 0; color: var(--muted); font-size: 13px; }
.suggestions { position: absolute; top: calc(100% - 8px); left: 18px; right: 18px; z-index: 20; background: #fffefc; border: 1px solid var(--line); border-radius: 18px; box-shadow: 0 18px 40px rgba(39,26,6,0.16); overflow: hidden; }
.suggestions button { width: 100%; border: 0; background: transparent; padding: 14px 16px; text-align: left; cursor: pointer; display: grid; gap: 4px; }
.suggestions button:hover, .suggestions button:focus-visible { background: #efedf9; outline: none; }
.suggestions strong { color: var(--accent-strong); }
.suggestions small { color: var(--muted); font-size: 12px; }
.home-stack, .table-stack { display: grid; gap: 24px; min-width: 0; }
.welcome-card, .map-card, .table-card, .history-card { padding: 24px; min-width: 0; }
.welcome-card { display: block; }
.welcome-copy h2 { margin: 0 0 8px; font-family: "Libre Caslon Text",Georgia,serif; font-size: clamp(30px,4vw,44px); line-height: 1.05; letter-spacing: -0.03em; }
.welcome-copy p { margin: 0; color: var(--muted); font-size: 17px; line-height: 1.55; }
.map-card { display: grid; align-content: space-between; gap: 20px; background: linear-gradient(145deg,rgba(63,102,83,0.08),rgba(228,226,255,0.72)),#fffefc; }
.map-card h3, .table-head h2, .history-card h3 { margin: 0; font-family: "Libre Caslon Text",Georgia,serif; font-size: 26px; letter-spacing: -0.02em; }
.map-placeholder { min-height: 320px; border-radius: 24px; border: 1px dashed var(--line); background: radial-gradient(circle at 20% 24%,rgba(169,29,35,0.16),transparent 16%),radial-gradient(circle at 72% 34%,rgba(204,75,51,0.2),transparent 14%),radial-gradient(circle at 44% 78%,rgba(127,18,24,0.12),transparent 18%),linear-gradient(180deg,rgba(255,255,255,0.85),rgba(248,235,228,0.82)); display: grid; place-items: center; text-align: center; color: var(--muted); padding: 24px; }
.map-placeholder p { margin: 0; max-width: 280px; line-height: 1.5; }
.map-widget { display: grid; gap: 14px; }
.map-controls { display: flex; gap: 10px; flex-wrap: wrap; }
.map-control-button { border: 1px solid var(--line); border-radius: 999px; background: var(--panel-soft); color: var(--accent-strong); padding: 10px 14px; font-weight: 700; cursor: pointer; }
.map-control-button:hover { background: var(--panel-alt); }
.map-control-reset { min-width: 88px; }
.map-viewer { min-height: 420px; overflow: hidden; place-items: stretch; padding: 12px; position: relative; touch-action: none; user-select: none; }
.map-canvas { width: 100%; height: 100%; }
.interactive-map { display: block; width: 100%; height: 100%; max-height: 760px; cursor: grab; }
.map-region { cursor: pointer; pointer-events: auto; transition: fill 140ms ease, opacity 140ms ease, stroke 140ms ease; }
.map-region:hover { opacity: 0.86; stroke: var(--accent-strong); stroke-width: 2.5; }
.map-region.is-active { stroke: var(--accent-strong); stroke-width: 3; }
.district-label-layer { pointer-events: none; }
.district-map-label { fill: var(--accent-strong); font-size: 10px; font-weight: 700; letter-spacing: 0.02em; paint-order: stroke; stroke: rgba(255,250,246,0.96); stroke-width: 4px; stroke-linejoin: round; text-transform: uppercase; }
.district-active-outline { stroke: var(--accent-strong); stroke-width: 3.2; stroke-linejoin: round; stroke-linecap: round; vector-effect: non-scaling-stroke; }
.map-marker-layer { pointer-events: none; }
.market-marker { cursor: pointer; pointer-events: auto; }
.market-marker:focus-visible { outline: none; }
.market-marker-hit { fill: transparent; }
.market-marker-stem { stroke: rgba(1,45,29,0.6); stroke-width: 2; }
.market-marker-dot { fill: var(--accent); stroke: #fffefc; stroke-width: 2.5; }
.market-marker-label { fill: var(--accent-strong); font-size: 11px; font-weight: 700; paint-order: stroke; stroke: rgba(255,250,246,0.96); stroke-width: 5px; stroke-linejoin: round; }
.map-note { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.5; }
.map-district-panel { display: grid; gap: 8px; padding: 16px 18px; border: 1px solid var(--line); border-radius: 20px; background: rgba(255,253,251,0.94); }
.map-district-panel strong { font-size: 18px; }
.map-district-panel p { margin: 0; color: var(--muted); line-height: 1.5; }
.market-chip-list { display: flex; gap: 10px; flex-wrap: wrap; }
.market-chip { border: 1px solid var(--line); border-radius: 999px; background: var(--panel-soft); color: var(--accent-strong); padding: 8px 12px; cursor: pointer; }
.market-chip:hover, .market-chip:focus-visible { background: var(--panel-alt); outline: none; }
.view { display: none; }
.view.active { display: block; }
.table-card { margin-top: 0; padding-left: 16px; padding-right: 16px; }
.table-head { display: flex; justify-content: flex-start; gap: 20px; align-items: flex-start; flex-wrap: wrap; margin-bottom: 12px; }
.table-head p { margin: 6px 0 0; color: var(--muted); max-width: 760px; }
.locked-headings { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
.locked-headings span { display: inline-flex; align-items: center; gap: 8px; background: var(--accent-soft); color: var(--accent-strong); border-radius: 999px; padding: 11px 18px; font-size: 18px; font-weight: 700; line-height: 1; box-shadow: inset 0 0 0 1px rgba(1,45,29,0.06); }
.filter-fab { position: fixed; right: 20px; bottom: 22px; width: 58px; height: 58px; border: 0; border-radius: 999px; background: linear-gradient(135deg,var(--accent),var(--accent-strong)); color: #fff; box-shadow: 0 18px 36px rgba(1,45,29,0.22); display: inline-flex; align-items: center; justify-content: center; gap: 0; cursor: pointer; z-index: 30; padding: 0; overflow: hidden; transition: width 260ms cubic-bezier(0.22,1,0.36,1), min-width 260ms cubic-bezier(0.22,1,0.36,1), padding 260ms cubic-bezier(0.22,1,0.36,1), transform 140ms ease, box-shadow 180ms ease; white-space: nowrap; }
.filter-fab-icon svg { width: 24px; height: 24px; display: block; }
.filter-fab-label { display: inline-block; font-size: 14px; font-weight: 700; max-width: 0; opacity: 0; overflow: hidden; transform: translateX(10px); position: relative; transition: max-width 260ms cubic-bezier(0.22,1,0.36,1), opacity 180ms ease, transform 260ms cubic-bezier(0.22,1,0.36,1); }
.filter-fab-label::after { content: ""; position: absolute; top: -20%; bottom: -20%; left: -45%; width: 36%; background: linear-gradient(115deg,rgba(255,255,255,0) 0%,rgba(255,255,255,0.16) 30%,rgba(255,255,255,0.9) 50%,rgba(255,255,255,0.16) 70%,rgba(255,255,255,0) 100%); transform: translateX(-180%) skewX(-18deg); opacity: 0; pointer-events: none; }
.filter-fab.is-expanded { width: auto; min-width: 176px; gap: 10px; padding: 0 18px; }
.filter-fab.is-expanded .filter-fab-label { max-width: 140px; opacity: 1; transform: translateX(0); }
.filter-fab.is-highlighted .filter-fab-label::after { opacity: 1; animation: filterHintSwipe 1.4s ease-in-out infinite; }
.filter-fab.is-collapsing { box-shadow: 0 12px 24px rgba(1,45,29,0.18); }
@keyframes filterHintSwipe { 0% { transform: translateX(-180%) skewX(-18deg); } 100% { transform: translateX(420%) skewX(-18deg); } }
.filter-modal-backdrop { position: fixed; inset: 0; background: rgba(22,26,50,0.34); display: flex; align-items: flex-end; justify-content: center; padding: 16px 16px calc(16px + env(safe-area-inset-bottom,0px)); z-index: 40; }
.filter-modal { width: min(540px,100%); max-height: min(calc(var(--visual-viewport-height,100vh) - 32px - env(safe-area-inset-bottom,0px)),760px); display: grid; gap: 16px; padding: 22px; overflow: hidden; }
.filter-modal-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.filter-modal-head h3 { margin: 0; font-size: 24px; }
.filter-modal-close { border: 0; background: transparent; color: var(--accent-strong); font-size: 28px; line-height: 1; cursor: pointer; }
.filter-modal-body { display: grid; gap: 14px; overflow: auto; padding-right: 4px; }
.filter-modal-group { display: grid; gap: 8px; }
.filter-modal-group label { color: var(--muted); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
.filter-multiselect { display: grid; gap: 10px; border: 1px solid var(--line); border-radius: 18px; background: #fffefc; padding: 12px; }
.filter-chip-row { display: flex; flex-wrap: wrap; gap: 8px; min-height: 28px; }
.filter-chip { display: inline-flex; align-items: center; gap: 8px; background: var(--accent-soft); color: var(--accent-strong); border-radius: 999px; padding: 6px 10px; font-size: 13px; font-weight: 700; }
.filter-chip-placeholder { color: var(--muted); font-size: 13px; }
.filter-chip-remove { border: 0; background: transparent; color: var(--accent-strong); font-size: 16px; line-height: 1; cursor: pointer; padding: 0; }
.filter-search-input { width: 100%; border: 1px solid var(--line); border-radius: 14px; background: var(--panel-soft); padding: 12px 14px; outline: none; }
.filter-search-results { display: none; gap: 6px; max-height: 220px; overflow: auto; border: 1px solid var(--line); border-radius: 14px; background: #fffefc; padding: 6px; }
.filter-search-results.is-open { display: grid; }
.filter-search-option { display: flex; align-items: center; justify-content: space-between; gap: 10px; width: 100%; border: 0; border-radius: 12px; background: transparent; padding: 10px 12px; text-align: left; cursor: pointer; }
.filter-search-option:hover, .filter-search-option:focus-visible, .filter-search-option.is-selected { background: var(--panel-alt); outline: none; }
.filter-option-check { color: var(--accent-strong); font-weight: 700; }
.filter-empty-note { margin: 0; padding: 8px 4px; }
.filter-modal-actions { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.filter-apply-button { min-width: 150px; }
.clear-button, .back-button, .inline-button { border: 0; border-radius: 999px; cursor: pointer; transition: transform 140ms ease, background 140ms ease; }
.clear-button, .back-button { background: linear-gradient(135deg,var(--accent),var(--accent-strong)); color: #fff; padding: 13px 18px; }
.clear-button:hover, .back-button:hover, .inline-button:hover { transform: translateY(-1px); }
.inline-button { background: transparent; color: var(--accent-strong); padding: 8px 0; font-weight: 700; }
.table-wrap { display: block; width: 100%; max-width: 100%; overflow: visible; border: 0; border-radius: 0; max-height: none; background: transparent; padding: 0; }
.results-list { display: grid; gap: 12px; }
.result-card { border: 1px solid var(--line); border-radius: 20px; background: var(--panel); box-shadow: var(--shadow); overflow: hidden; }
.result-card-main { display: grid; gap: 0; padding: 0; }
.result-card-identity { display: grid; gap: 8px; padding: 24px; background: linear-gradient(180deg,#f7f6ff 0%,#f2f1ff 100%); border-bottom: 1px solid var(--line); }
.result-card-title-row { display: flex; align-items: baseline; gap: 0; flex-wrap: wrap; }
.result-card-label, .result-price-label, .result-detail-label { color: var(--muted); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
.result-card-identity h3 { margin: 0; font-family: "Libre Caslon Text",Georgia,serif; font-size: clamp(24px,2.8vw,38px); line-height: 1.05; letter-spacing: -0.03em; }
.result-card-meta { display: flex; flex-wrap: wrap; gap: 10px 26px; align-items: baseline; }
.result-meta-item, .result-detail-block, .result-price-group { display: grid; gap: 3px; padding: 0; border: 0; border-radius: 0; background: transparent; }
.result-meta-item { min-width: 120px; }
.result-meta-value, .result-detail-value { font-size: 17px; font-weight: 700; color: var(--ink); }
.result-card-prices { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 0; background: #fff; }
.result-card-details { display: grid; grid-template-columns: minmax(0,0.95fr) minmax(0,1.05fr); gap: 0; background: #fcfbff; border-top: 1px solid var(--line); }
.price-stack { display: grid; gap: 4px; justify-items: center; }
.price-value { display: inline-block; font-size: clamp(28px,2.1vw,34px); line-height: 1.04; font-weight: 800; letter-spacing: -0.035em; }
.price-value-max { color: var(--price-max); }
.price-value-min { color: var(--price-min); }
.price-value-modal { color: var(--price-modal); }
.price-delta { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; white-space: nowrap; }
.price-delta-gain { color: var(--gain); }
.price-delta-loss { color: var(--loss); }
.price-delta-flat { color: var(--muted); font-weight: 600; }
.delta-icon { width: 14px; height: 14px; flex: 0 0 auto; }
.delta-flat { display: inline-block; width: 14px; text-align: center; }
.date-stack { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 10px 16px; }
.date-stack-item { display: grid; gap: 2px; }
.date-stack-label { color: var(--muted); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
.result-card-toggle { width: 100%; border: 0; border-top: 1px solid rgba(1,45,29,0.12); background: linear-gradient(180deg,#154031 0%,#012d1d 100%); color: #fff; padding: 14px 18px; display: flex; align-items: center; justify-content: center; gap: 12px; font-weight: 700; cursor: pointer; position: relative; }
.result-card-toggle:hover, .result-card-toggle:focus-visible { background: linear-gradient(180deg,#1b4a39 0%,#0b3828 100%); outline: none; }
.result-card-toggle-label { text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 3px; text-transform: uppercase; letter-spacing: 0.06em; font-size: 12px; }
.result-card-toggle-chevron { font-size: 16px; line-height: 1; position: absolute; right: 18px; top: 50%; transform: translateY(-50%); }
.result-card-history { padding: 0 8px 14px; background: transparent; }
.empty-state { padding: 24px; color: var(--muted); }
.history-card { background: transparent; }
.history-collapse-wrap { display: flex; justify-content: center; padding-top: 12px; }
.history-collapse-button { border: 1px solid var(--line); border-radius: 999px; background: #fff; color: var(--accent-strong); width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; }
.history-collapse-button:hover, .history-collapse-button:focus-visible { background: #f3f6f3; outline: none; }
.history-collapse-arrow { font-size: 12px; line-height: 1; }
.chart-shell { border: 0; border-radius: 0; padding: 0; background: transparent; }
.chart-scroll-note { margin: 0 0 12px; color: var(--muted); font-size: 12px; text-align: center; letter-spacing: 0.02em; }
.chart-layout { display: grid; grid-template-columns: 25px minmax(0,1fr); align-items: start; gap: 0; }
.chart-axis-y { position: sticky; left: 0; z-index: 2; background: linear-gradient(90deg,#fff 0%,#fff 88%,rgba(255,255,255,0.96) 100%); }
.chart-axis-y svg { display: block; overflow: visible; }
.chart-scroll { position: relative; z-index: 0; overflow-x: auto; overflow-y: hidden; -webkit-overflow-scrolling: touch; touch-action: pan-x pinch-zoom; }
.chart-scroll > svg, .chart-scroll > div { min-width: 700px; }
.history-layout { display: grid; gap: 10px; }
.history-chart-panel { min-width: 0; }
[data-chart-root="true"] { display: block; }
.chart-point-group { cursor: pointer; }
.chart-summary-shell { min-width: 0; overflow: hidden; }
.chart-summary { display: grid; gap: 10px; padding: 12px 14px; border: 1px solid var(--line); border-radius: 18px; background: #fff; width: 100%; box-sizing: border-box; }
.chart-summary-date { display: flex; justify-content: flex-start; gap: 12px; align-items: center; flex-wrap: nowrap; }
.chart-summary-date-label { color: var(--muted); font-size: 13px; }
.chart-summary-date-value { font-size: 16px; margin-left: auto; text-align: right; }
.chart-summary-metrics { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 10px 12px; align-items: start; }
.chart-metric { display: grid; gap: 4px; min-width: 122px; justify-items: center; text-align: center; border-radius: 22px; padding: 12px 18px; font-size: 14px; font-weight: 700; }
.chart-metric-label { display: inline-flex; align-items: center; justify-content: center; gap: 8px; text-transform: uppercase; letter-spacing: 0.04em; font-size: 11px; }
.chart-metric-line { width: 24px; height: 0; border-top-width: 3px; border-top-style: solid; display: inline-block; }
.chart-metric-line-max { border-color: var(--price-max); }
.chart-metric-line-min { border-color: var(--price-min); }
.chart-metric-line-modal { border-color: var(--price-modal); border-top-style: dashed; }
.chart-metric-value { font-size: 18px; letter-spacing: -0.02em; line-height: 1.05; }
.chart-metric-max { background: rgba(30,58,138,0.12); color: var(--price-max); }
.chart-metric-min { background: rgba(194,65,12,0.12); color: var(--price-min); }
.chart-metric-modal { background: rgba(55,65,81,0.12); color: var(--price-modal); }
.chart-metric-slot-max { justify-self: start; }
.chart-metric-slot-min { justify-self: end; }
.chart-metric-slot-modal { grid-column: 1 / -1; justify-self: center; }
.axis-note { color: var(--muted); font-size: 13px; }
.footer-note { margin-top: 16px; color: var(--muted); font-size: 14px; }
.muted { color: var(--muted); }
.result-price-group { display: grid; gap: 10px; padding: 18px 20px 20px; justify-items: center; text-align: center; border-right: 1px solid var(--line); }
.result-price-group:last-child { border-right: 0; }
.result-card-details .result-detail-block { padding: 18px 20px 20px; }
.result-card-details .result-detail-block:first-child { display: grid; grid-template-columns: minmax(0,0.95fr) minmax(0,1.05fr); align-items: center; border-right: 1px solid var(--line); }
.result-card-details .result-detail-block:first-child .result-detail-label { margin-bottom: 0; align-self: center; }
.result-card-details .result-detail-block:first-child .result-detail-value { justify-self: end; text-align: right; align-self: center; }
.result-detail-label { margin-bottom: 6px; }
.date-stack-item span:last-child { font-weight: 700; color: var(--ink); }
@media (min-width: 900px) {
  .result-card { border-radius: 18px; }
  .result-card-main { grid-template-columns: 1.45fr 2fr; grid-template-areas: "identity prices" "details details"; }
  .result-card-identity { grid-area: identity; border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); min-height: 152px; align-content: start; }
  .result-card-prices { grid-area: prices; border-bottom: 1px solid var(--line); }
  .result-card-details { grid-area: details; }
  .result-card-toggle-label { font-size: 11px; }
}
@media (max-width: 720px) {
  .shell { padding: 12px 8px 30px; }
  .welcome-card, .map-card, .table-card, .history-card, .search-panel { padding: 14px; border-radius: 18px; }
  th, td { padding: 10px 9px; }
  .table-stack, .home-stack { gap: 16px; }
  .search-panel, .table-card, .welcome-card, .map-card { width: 100%; }
  .table-card { padding-left: 10px; padding-right: 10px; }
  .table-head { gap: 8px; margin-bottom: 8px; }
  .table-head p { max-width: none; font-size: 15px; }
  .shell-top-inner { align-items: center; }
  .locale-toggle-button { padding: 8px 10px; }
  .shell-home-button { min-width: 96px; padding: 9px 12px; }
  .locked-headings { gap: 8px; }
  .locked-headings span { padding: 10px 15px; font-size: 16px; }
  .table-wrap { max-height: none; border-radius: 0; padding: 0; }
  .results-list { gap: 10px; }

  <body>
    <div id="app"></div>
    <script>
const DATA_BASE_URL = "https://product-tpml.github.io/Agro_dashboard_hosted";

(function() {
  const app = document.getElementById("app");
  const LOCALE_STORAGE_KEY = "commodity-dashboard-locale";
  const FILTER_HINT_DURATION_MS = 5000;
  const FILTER_HINT_COLLAPSE_MS = 320;
  const SEARCH_INPUT_DEBOUNCE_MS = 120;
  const PRICE_COLORS = { max: "#1E3A8A", min: "#C2410C", modal: "#CC9900" };

  const state = {
    route: parseRoute(),
    query: "",
    suggestions: [],
    context: null,
    allRows: [],
    baseRows: [],
    filters: {},
    filterDrafts: {},
    filterSearches: {},
    pendingFilterSelection: null,
    activeFilterField: "",
    isFilterModalOpen: false,
    showFilterHint: false,
    shouldScrollTableIntoView: false,
    shouldPrimeExpandedHistory: false,
    activeChartDate: null,
    expandedRowKey: null,
    searchToken: 0,
    locale: getStoredLocale(),
    translations: { commodities: {}, markets: {}, varieties: {} },
    searchIndex: { commodities: [], markets: [], varieties: [] },
    mapSvgMarkup: "",
    mapDistricts: [],
    mapBaseViewBox: null,
    mapViewBox: null,
    activeMapDistrictSlug: "",
    cachedVisibleRowsKey: "",
    cachedVisibleRows: [],
    cachedFilterOptions: {},
  };

  let filterHintTimer = null;
  let filterHintFinalizeTimer = null;
  let searchInputTimer = null;
  let renderFrameId = null;
  let stickyTableHeaderCleanup = null;

  const MAP_DISTRICT_COLORS = ["#d85f52","#e59f3a","#d9c24f","#90b654","#4fa06e","#4f8fb6","#6d79c7","#9a69c4","#c05b9a","#d47d64"];

  const mapGesture = { pointerId: null, isPanning: false, panStartClient: null, panStartViewBox: null, touchMode: null, pinchStartDistance: 0, pinchStartViewBox: null, pinchAnchorSvg: null, didMove: false, suppressClickUntil: 0 };

  document.addEventListener("click", handleDocumentClick);
  window.addEventListener("popstate", handlePopState);
  setupVisualViewportTracking();
  boot();

  async function boot() {
    if (state.route.view === "table") primeTableArrivalUi();
    render();
    await Promise.all([
      loadTranslations(),
      loadSearchIndex(),
      loadMapSvg(),
      loadMapData(),
      loadObservations(),
    ]);
    if (state.route.view === "table") { loadContext(); return; }
    render();
  }

  async function fetchDataUrl(path) { return fetch(DATA_BASE_URL + path); }

  async function loadMapSvg() {
    try {
      const response = await fetchDataUrl("/karnataka-geo.svg");
      if (!response.ok) throw new Error("Map request failed: " + response.status);
      state.mapSvgMarkup = await response.text();
    } catch (e) { state.mapSvgMarkup = ""; }
  }

  async function loadMapData() {
    try {
      const payload = await (await fetchDataUrl("/data/map-data.json")).json();
      state.mapDistricts = payload.districts || [];
    } catch (e) { state.mapDistricts = []; }
  }

  async function loadTranslations() {
    try {
      const payload = await (await fetchDataUrl("/translations.json")).json();
      state.translations = { commodities: payload.commodities || {}, markets: payload.markets || {}, varieties: payload.varieties || {} };
    } catch (e) { state.translations = { commodities: {}, markets: {}, varieties: {} }; }
  }

  async function loadSearchIndex() {
    try {
      const payload = await (await fetchDataUrl("/data/search-index.json")).json();
      state.searchIndex = { commodities: payload.commodities || [], markets: payload.markets || [], varieties: payload.varieties || [] };
    } catch (e) { state.searchIndex = { commodities: [], markets: [], varieties: [] }; }
    if (state.query.trim() && hasClientSearchIndex()) state.suggestions = buildLocalizedSearchResults(state.query.trim());
  }

  async function loadObservations() {
    try { state.allRows = await (await fetchDataUrl("/data/observations.json")).json(); } catch (e) { state.allRows = []; }
    invalidateDerivedDataCaches();
  }

  function parseRoute() {
    const params = new URLSearchParams(window.location.search);
    const view = params.get("view") === "table" ? "table" : "home";
    return { view, type: params.get("type") || "", commodity: params.get("commodity") || "", market: params.get("market") || "", variety: params.get("variety") || "" };
  }

  function buildRouteUrl(route) {
    const params = new URLSearchParams();
    if (route.view === "table") {
      params.set("view","table"); params.set("type",route.type);
      if (route.commodity) params.set("commodity",route.commodity);
      if (route.market) params.set("market",route.market);
      if (route.variety) params.set("variety",route.variety);
    }
    const q = params.toString();
    const basePath = window.location.pathname || "./";
    return q ? basePath + "?" + q : basePath;
  }

  function navigate(route) {
    window.history.pushState({},"",buildRouteUrl(route));
    state.route = route; state.context = null; state.baseRows = []; state.filters = {};
    state.filterDrafts = {}; state.filterSearches = {}; state.pendingFilterSelection = null;
    state.activeFilterField = ""; state.isFilterModalOpen = false; state.showFilterHint = false;
    state.shouldScrollTableIntoView = false; state.activeChartDate = null; state.expandedRowKey = null;
    state.suggestions = []; invalidateDerivedDataCaches();
    if (route.view === "table") primeTableArrivalUi(); else clearFilterHintTimers();
    scheduleRender();
    if (route.view === "table") loadContext();
  }

  function handlePopState() {
    state.route = parseRoute(); state.context = null; state.baseRows = []; state.filters = {};
    state.filterDrafts = {}; state.filterSearches = {}; state.pendingFilterSelection = null;
    state.activeFilterField = ""; state.isFilterModalOpen = false; state.showFilterHint = false;
    state.shouldScrollTableIntoView = false; state.activeChartDate = null; state.expandedRowKey = null;
    state.suggestions = []; invalidateDerivedDataCaches();
    if (state.route.view === "table") primeTableArrivalUi(); else clearFilterHintTimers();
    scheduleRender();
    if (state.route.view === "table") loadContext();
  }

  async function search(query) {
    if (query !== state.query) return;
    const token = ++state.searchToken;
    if (!query.trim()) { state.suggestions = []; syncSearchSuggestionsUi(); return; }
    if (hasClientSearchIndex()) {
      if (token !== state.searchToken) return;
      state.suggestions = buildLocalizedSearchResults(query.trim());
      syncSearchSuggestionsUi(); return;
    }
    state.suggestions = []; syncSearchSuggestionsUi();
  }

  async function loadContext() {
    const route = state.route;
    try {
      const derived = deriveContext(route);
      state.context = derived.context; state.baseRows = derived.rows;
      state.filters = buildInitialFilters(derived.context.filters);
      state.filterDrafts = cloneFilters(state.filters);
      state.filterSearches = buildInitialFilterSearches(derived.context.filters);
      state.pendingFilterSelection = null; state.activeFilterField = ""; state.isFilterModalOpen = false;
      state.activeChartDate = null; state.expandedRowKey = null; invalidateDerivedDataCaches();
    } catch (e) {
      state.context = { heading:"Unavailable", locked:{}, filters:[] }; state.baseRows = [];
      state.filters = {}; state.filterDrafts = {}; state.filterSearches = {};
      state.pendingFilterSelection = null; state.activeFilterField = ""; state.isFilterModalOpen = false;
      state.activeChartDate = null; invalidateDerivedDataCaches();
    }
    scheduleRender();
  }

  function buildInitialFilters(fn) { const n={}; fn.forEach(function(f){n[f]=[]}); return n; }
  function buildInitialFilterSearches(fn) { const n={}; fn.forEach(function(f){n[f]=""}); return n; }
  function cloneFilters(f) { const n={}; Object.entries(f).forEach(function(e){n[e[0]]=[...e[1]]}); return n; }

  function deriveContext(route) {
    if (!state.allRows.length) throw Error("Observation data not loaded.");
    if (route.type==="commodity") {
      if (!route.commodity) throw Error("Missing commodity.");
      return { context:{ type:"commodity", heading:route.commodity, locked:{commodity:route.commodity}, filters:["market","variety"], resultLabel:route.commodity+" (Commodity)" }, rows:state.allRows.filter(function(r){return r.commodity===route.commodity}) };
    }
    if (route.type==="market") {
      if (!route.market) throw Error("Missing market.");
      return { context:{ type:"market", heading:route.market, locked:{market:route.market}, filters:["commodity","variety"], resultLabel:route.market+" (Market)" }, rows:state.allRows.filter(function(r){return r.market===route.market}) };
    }
    if (route.type==="variety") {
      if (!route.commodity||!route.variety) throw Error("Missing commodity or variety.");
      return { context:{ type:"variety", heading:route.commodity+" / "+route.variety, locked:{commodity:route.commodity,variety:route.variety}, filters:["market"], resultLabel:route.variety+" ("+route.commodity+")" }, rows:state.allRows.filter(function(r){return r.commodity===route.commodity&&r.variety===route.variety}) };
    }
    throw Error("Invalid context type.");
  }

  function handleDocumentClick(e) {
    if (e.target.closest(".shell-top")) return;
    if (!e.target.closest("[data-search-root]")) { if (state.suggestions.length) { state.suggestions=[]; syncSearchSuggestionsUi(); } }
  }

  function handleSearchInput(e) { state.query=e.target.value; scheduleSearchInputWork(state.query); }

  function handleSuggestionSelect(result) {
    state.query=""; navigate({ view:"table", type:result.type, commodity:result.commodity||"", market:result.market||"", variety:result.variety||"" });
  }

  function handleHomeClick() { state.query=""; navigate({ view:"home", type:"", commodity:"", market:"", variety:"" }); }
  function handleMapMarketSelect(market) { navigate({ view:"table", type:"market", commodity:"", market:market, variety:"" }); }

  function zoomMap(d) { const vb=getCurrentMapViewBox(); if(!vb) return; const s=d>0?.82:1.18; state.mapViewBox=scaleMapViewBox(vb,s); scheduleRender(); }
  function resetMapViewport() { state.mapViewBox=state.mapBaseViewBox?[...state.mapBaseViewBox]:null; state.activeMapDistrictSlug=""; }

  function focusMapRegion(bounds,slug) {
    if (!bounds) return;
    const p=.22, w=Math.max(24,bounds.width*(1+p*2)), h=Math.max(24,bounds.height*(1+p*2));
    state.mapViewBox=constrainMapViewBox([bounds.x-(bounds.width*p),bounds.y-(bounds.height*p),w,h]);
    state.activeMapDistrictSlug=slug||""; scheduleRender();
  }

  function openFilterModal() { state.filterDrafts=cloneFilters(state.filters); state.filterSearches=buildInitialFilterSearches(state.context?state.context.filters:[]); state.pendingFilterSelection=null; state.activeFilterField=""; state.isFilterModalOpen=true; scheduleRender(); }
  function closeFilterModal() { state.filterDrafts=cloneFilters(state.filters); state.filterSearches=buildInitialFilterSearches(state.context?state.context.filters:[]); state.pendingFilterSelection=null; state.activeFilterField=""; state.isFilterModalOpen=false; scheduleRender(); }
  function updateFilterSearch(n,v,ss,se) { state.activeFilterField=n; state.filterSearches[n]=v; state.pendingFilterSelection={hadFocus:true,field:n,selectionStart:ss,selectionEnd:se}; syncFilterFieldUi(n); }
  function activateFilterField(n) { if(state.activeFilterField===n) return; state.activeFilterField=n; syncAllFilterFieldUis(); }
  function toggleDraftFilterValue(n,v) { const s=state.filterDrafts[n]||[]; state.filterDrafts[n]=s.includes(v)?s.filter(function(e){return e!==v}):[...s,v]; scheduleRender(); }
  function removeDraftFilterValue(n,v) { state.filterDrafts[n]=(state.filterDrafts[n]||[]).filter(function(e){return e!==v}); scheduleRender(); }
  function applyFilterDrafts() { state.filters=cloneFilters(state.filterDrafts); invalidateDerivedDataCaches(); state.pendingFilterSelection=null; state.activeFilterField=""; state.isFilterModalOpen=false; state.activeChartDate=null; state.expandedRowKey=null; scheduleRender(); }
  function clearFilterDrafts() { Object.keys(state.filterDrafts).forEach(function(n){state.filterDrafts[n]=[];state.filterSearches[n]="";}); state.filters=cloneFilters(state.filterDrafts); invalidateDerivedDataCaches(); state.pendingFilterSelection=null; state.activeFilterField=""; state.isFilterModalOpen=false; state.activeChartDate=null; state.expandedRowKey=null; scheduleRender(); }
  function setActiveChartDate(d) { state.activeChartDate=d; scheduleRender(); }

  function getRowsForCurrentView() {
    const ck=buildVisibleRowsCacheKey();
    if(ck&&state.cachedVisibleRowsKey===ck) return state.cachedVisibleRows;
    var fr=state.baseRows.filter(function(r){return Object.entries(state.filters).every(function(e){return!e[1].length||e[1].includes(r[e[0]])})});
    var lm=new Map;
    fr.forEach(function(r){var gk=r.commodity+"|"+r.market+"|"+r.variety+"|"+r.grade;var ex=lm.get(gk);if(!ex||r.reportDate>ex.reportDate)lm.set(gk,r)});
    var sr=[...lm.values()].sort(function(l,r){var mc=l.market.localeCompare(r.market);if(mc!==0)return mc;var cc=l.commodity.localeCompare(r.commodity);if(cc!==0)return cc;var vc=l.variety.localeCompare(r.variety);if(vc!==0)return vc;return l.grade.localeCompare(r.grade)});
    state.cachedVisibleRowsKey=ck; state.cachedVisibleRows=sr; return sr;
  }

  function getFilterOptions(field,sourceFilters) {
    var ck=field+"::"+serializeFilters(sourceFilters);
    if(state.cachedFilterOptions[ck]) return state.cachedFilterOptions[ck];
    var rows=state.baseRows.filter(function(r){return Object.entries(sourceFilters).every(function(e){if(e[0]===field)return true;return!e[1].length||e[1].includes(r[e[0]])})});
    var opts=[...new Set(rows.map(function(r){return r[field]}))].sort(function(l,r){return l.localeCompare(r)});
    state.cachedFilterOptions[ck]=opts; return opts;
  }

  function getDraftFilterOptions(field,query) {
    var opts=getFilterOptions(field,state.filterDrafts);
    var nq=normalizeSearchText(query);
    if(!nq) return opts;
    return opts.filter(function(v){return normalizeSearchText(translateEntity(field,v)).includes(nq)||normalizeSearchText(v).includes(nq)});
  }

  function getHistoryRows(sr) {
    var wd=sr.perishability==="perishable"?7:30;
    var end=new Date(sr.reportDate+"T00:00:00");
    var start=new Date(end); start.setDate(start.getDate()-(wd-1));
    return state.baseRows.filter(function(r){if(r.commodity!==sr.commodity)return false;if(r.market!==sr.market)return false;if(r.variety!==sr.variety)return false;if(r.grade!==sr.grade)return false;var cd=new Date(r.reportDate+"T00:00:00");return cd>=start&&cd<=end}).sort(function(l,r){return l.reportDate.localeCompare(r.reportDate)});
  }

  function formatLockedHeadings() {
    if(!state.context) return "";
    return Object.entries(state.context.locked).map(function(e){return"<span>"+capitalize(e[0])+": "+escapeHtml(translateEntity(e[0],e[1]))+"</span>"}).join("");
  }

  function render() {
    var ss=captureSearchInputState(); var fs=captureFilterInputState(); var cs=captureScrollState();
    var rows=state.route.view==="table"&&state.context?getRowsForCurrentView():[];
    teardownStickyTableHeader();
    app.innerHTML='<div class="shell"><div class="shell-top">'+renderTopBar()+'</div><main><section class="view '+(state.route.view==="home"?"active":"")+'" id="homeView"><div class="home-stack"><section class="panel welcome-card"><div class="welcome-copy"><p class="search-label">Home</p><h2>Home</h2><p>Use the search bar to start with a commodity, market, or variety. After opening the table, refine the results using the available filters.</p><p>Click any row to view recent price movement.</p></div></section>'+renderSearchPanel()+'<aside class="panel map-card"><div><p class="search-label">Market Map</p><h3>Browse by district and market</h3><p class="muted">Search remains available, but you can also click a district, zoom in, and open a market table directly from the map.</p></div>'+renderMapPanel()+'</aside></div></section><section class="view '+(state.route.view==="table"?"active":"")+'" id="tableView"><div class="table-stack">'+renderSearchPanel()+'<section class="panel table-card"><div class="table-head"><div><p class="search-label">Showing Results For</p><div class="locked-headings">'+formatLockedHeadings()+'</div><p>Use the filters to narrow the list. Click any row to view the recent price trend for that exact commodity entry.</p></div></div>'+renderFilterLauncher()+renderStickyTableHeader(rows)+'<div class="table-wrap" data-preserve-scroll-id="table-wrap">'+renderResults(rows)+'</div></section></div></section></main>'+renderFilterModal()+'</div>';
    bindEvents(); restoreSearchInputState(ss); restoreFilterInputState(fs); restoreScrollState(cs); runPostRenderEffects();
  }

  function captureSearchInputState() { return captureFocusedInputState("[data-global-search]"); }
  function restoreSearchInputState(s) { restoreFocusedInputState(".view.active [data-global-search]",s); }
  function captureFilterInputState() {
    if(state.pendingFilterSelection){var s={...state.pendingFilterSelection};state.pendingFilterSelection=null;return s}
    var s=captureFocusedInputState("[data-filter-search]"); if(!s)return null; return{...s,field:document.activeElement.dataset.filterSearch||""};
  }
  function restoreFilterInputState(s) { if(!s||!s.field) return; restoreFocusedInputState('[data-filter-search="'+s.field+'"]',s); }
  function captureFocusedInputState(sel) { var inp=document.activeElement; if(!inp||!inp.matches(sel))return null; return{hadFocus:document.activeElement===inp,selectionStart:inp.selectionStart,selectionEnd:inp.selectionEnd}; }
  function restoreFocusedInputState(sel,s) { if(!s||!s.hadFocus)return; var inp=document.querySelector(sel); if(!inp)return; inp.focus(); if(typeof s.selectionStart==="number"&&typeof s.selectionEnd==="number") inp.setSelectionRange(s.selectionStart,s.selectionEnd); }

  function captureScrollState() {

    return '<div class="chart-layout"><div class="chart-axis-y" aria-hidden="true"><svg viewBox="0 0 '+aw+' '+h+'" width="'+aw+'" height="'+h+'"><line x1="'+aw+'" y1="'+pt+'" x2="'+aw+'" y2="'+(h-pb)+'" stroke="#d5d8e6" /><line x1="'+(aw-1)+'" y1="'+(h-pb)+'" x2="'+aw+'" y2="'+(h-pb)+'" stroke="#cfd5e3" stroke-width="1.6" />'+yTicks+'</svg></div><div class="chart-scroll" data-preserve-scroll-id="chart-scroll" data-chart-row-key="'+escapeAttribute(rowKey)+'" data-chart-initial-position="right" data-chart-active-x="'+aX+'" data-chart-x-step="'+xSt+'" data-chart-point-count="'+rows.length+'"><svg viewBox="0 0 '+w+' '+h+'" width="'+w+'" height="'+h+'" role="img" aria-label="Price history" data-chart-root="true">'+grid+'<path d="'+minP+'" fill="none" stroke="'+PRICE_COLORS.min+'" stroke-width="3" /><path d="'+modP+'" fill="none" stroke="'+PRICE_COLORS.modal+'" stroke-width="3" stroke-dasharray="10 6" /><path d="'+maxP+'" fill="none" stroke="'+PRICE_COLORS.max+'" stroke-width="3.5" />'+pts+labels+'</svg></div></div>';

  function renderChartPointCircle(x,y,c,a){return'<circle cx="'+x+'" cy="'+y+'" r="'+(a?7:5.5)+'" fill="'+(a?c:"#fffaf6")+'" stroke="'+c+'" stroke-width="2.5" />'}

  function buildChartScale(vals) {

  function selectDistributedPoints(cands,count,bounds){var c={x:bounds.x+(bounds.width/2),y:bounds.y+(bounds.height/2)},sel=[],rem=[...cands];rem.sort(function(l,r){return distanceBetween(l,c)-distanceBetween(r,c)});if(rem.length)sel.push(rem.shift());while(sel.length<count&&rem.length){var bi=0,bs=-1;rem.forEach(function(ca,i){var d=Math.min(...sel.map(function(p){return distanceBetween(ca,p)}));if(d>bs){bs=d;bi=i}});sel.push(rem.splice(bi,1)[0])}while(sel.length<count)sel.push(c);return sel}
  function distanceBetween(l,r){var dx=l.x-r.x,dy=l.y-r.y;return Math.sqrt((dx*dx)+(dy*dy))}
  function getTouchDistance(f,s){var dx=s.clientX-f.clientX,dy=s.clientY-f.clientY;return Math.sqrt((dx*dx)+(dy*dy))}
  function getTouchMidpoint(f,s){return{x:(f.clientX+s.clientX)/2,y:(f.clientY+s.clientY)/2}}

  function highlightMatch(text,query){if(!query.trim())return escapeHtml(text);var lt=normalizeSearchText(text),lq=normalizeSearchText(query),i=lt.indexOf(lq);if(i===-1)return escapeHtml(text);var b=escapeHtml(text.slice(0,i)),m=escapeHtml(text.slice(i,i+query.length)),a=escapeHtml(text.slice(i+query.length));return b+"<strong>"+m+"</strong>"+a}
  function formatCurrency(v){return Number(v).toLocaleString("en-IN")}
  function formatNumber(v){return Number(v).toLocaleString("en-IN")}
  function formatDateShort(v){var y=v.split("-");return y[2]+"-"+y[1]}
  function formatDateFull(v){var y=v.split("-");return y[2]+"-"+y[1]+"-"+y[0]}
  function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v))}
  function capitalize(v){return v.charAt(0).toUpperCase()+v.slice(1)}
  function getAllLabel(f){if(f==="variety")return"All varieties";if(f==="commodity")return"All commodities";if(f==="market")return"All markets";return"All "+f}

  function setLocale(loc){if(loc!=="en"&&loc!=="kn")return;state.locale=loc;storeLocale(loc);if(state.query.trim()&&hasClientSearchIndex())state.suggestions=buildLocalizedSearchResults(state.query.trim());scheduleRender()}
  function scheduleSearchInputWork(q){if(searchInputTimer!==null)window.clearTimeout(searchInputTimer);if(!q.trim()){search(q);return}searchInputTimer=window.setTimeout(function(){searchInputTimer=null;search(q)},SEARCH_INPUT_DEBOUNCE_MS)}
  function scheduleRender(){if(renderFrameId!==null)return;renderFrameId=window.requestAnimationFrame(function(){renderFrameId=null;render()})}
  function invalidateDerivedDataCaches(){state.cachedVisibleRowsKey="";state.cachedVisibleRows=[];state.cachedFilterOptions={}}
  function buildVisibleRowsCacheKey(){if(!state.context)return"";return[state.route.type,state.route.commodity,state.route.market,state.route.variety,state.baseRows.length,serializeFilters(state.filters)].join("::")}
  function serializeFilters(f){return Object.keys(f).sort().map(function(k){return k+":"+((f[k]||[]).slice().sort().join("|"))}).join(";")}
  function getStoredLocale(){try{var s=window.localStorage.getItem(LOCALE_STORAGE_KEY);return s==="kn"?"kn":"en"}catch(e){return"en"}}
  function storeLocale(l){try{window.localStorage.setItem(LOCALE_STORAGE_KEY,l)}catch(e){}}
  function translateEntity(f,v){var tg=getTranslationGroup(f),e=tg[String(v)]||null;if(!e)return String(v);return state.locale==="kn"&&e.kn?e.kn:e.en||String(v)}
  function getTranslationGroup(f){if(f==="commodity")return state.translations.commodities||{};if(f==="market")return state.translations.markets||{};if(f==="variety")return state.translations.varieties||{};return{}}
  function hasClientSearchIndex(){return state.searchIndex.commodities.length>0||state.searchIndex.markets.length>0||state.searchIndex.varieties.length>0}

  function buildLocalizedSearchResults(q){var nq=normalizeSearchText(q);var cr=state.searchIndex.commodities.map(function(n){return buildCommoditySearchResult(n,nq)}).filter(Boolean).sort(compareLocalizedSearchResults).slice(0,6);var mr=state.searchIndex.markets.map(function(n){return buildMarketSearchResult(n,nq)}).filter(Boolean).sort(compareLocalizedSearchResults).slice(0,6);var vr=state.searchIndex.varieties.map(function(i){return buildVarietySearchResult(i,nq)}).filter(Boolean).sort(compareLocalizedSearchResults).slice(0,8);return[...cr,...mr,...vr].slice(0,12)}
  function buildCommoditySearchResult(n,q){var sc=getLocalizedMatchScore([n,translateEntityWithLocale("commodity",n,"en"),translateEntityWithLocale("commodity",n,"kn")],q);return sc?{type:"commodity",commodity:n,score:sc}:null}
  function buildMarketSearchResult(n,q){var sc=getLocalizedMatchScore([n,translateEntityWithLocale("market",n,"en"),translateEntityWithLocale("market",n,"kn")],q);return sc?{type:"market",market:n,score:sc}:null}
  function buildVarietySearchResult(i,q){var sc=getLocalizedMatchScore([i.variety,i.commodity,translateEntityWithLocale("variety",i.variety,"en"),translateEntityWithLocale("variety",i.variety,"kn"),translateEntityWithLocale("commodity",i.commodity,"en"),translateEntityWithLocale("commodity",i.commodity,"kn")],q);return sc?{type:"variety",commodity:i.commodity,variety:i.variety,score:sc}:null}
  function getLocalizedMatchScore(cand,q){var best=null;cand.forEach(function(c){var nc=normalizeSearchText(c),i=nc.indexOf(q);if(i===-1)return;var sc={startsWith:i===0?0:1,position:i,length:nc.length};if(!best||compareMatchScore(sc,best)<0)best=sc});return best}
  function compareLocalizedSearchResults(l,r){var sc=compareMatchScore(l.score,r.score);if(sc!==0)return sc;return getSuggestionLabel(l).localeCompare(getSuggestionLabel(r))}
  function compareMatchScore(l,r){if(l.startsWith!==r.startsWith)return l.startsWith-r.startsWith;if(l.position!==r.position)return l.position-r.position;return l.length-r.length}
  function normalizeSearchText(v){return String(v||"").normalize("NFKC").toLowerCase().trim()}
  function escapeHtml(v){return v.replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll("\"","&quot;").replaceAll("'","&#39;")}
  function escapeAttribute(v){return escapeHtml(v)}
})();
</script>
